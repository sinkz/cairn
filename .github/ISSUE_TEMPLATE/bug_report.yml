name: Bug report
description: Report a reproducible problem in Cairn.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, fixture shape, and expected vs actual output.
      placeholder: |
        apollokairn init --path PATH_TO_VAULT --profile engineering
        apollokairn index --path PATH_TO_VAULT --rebuild
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.1.0 or commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, shell, and install method.
      placeholder: Windows 11, Python 3.12, PowerShell, editable install
